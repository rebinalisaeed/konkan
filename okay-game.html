<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یاری Okay - پۆل</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a, #0e2a1a);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .game-info {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .game-info > div {
            background: #2c2c2c;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .players-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .player {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .player.active {
            border-color: #ffd700;
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
        }
        
        .player h3 {
            margin: 0 0 10px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .hand {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
            min-height: 80px;
        }
        
        .meld-area {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 8px;
            min-height: 70px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .meld-area .tile {
            background: rgba(100,100,100,0.5);
            border: 1px solid #888;
        }
        
        .tile {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 70px;
            background: linear-gradient(145deg, #fff, #e0e0e0);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            color: #333;
            position: relative;
        }
        
        .tile:hover {
            transform: translateY(-5px);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.4);
        }
        
        .tile.selected {
            border: 3px solid #ffd700;
            transform: scale(1.02);
        }
        
        .tile.joker {
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            color: #333;
        }
        
        .tile[data-color="ڕەش"] { color: #000; border-left: 5px solid #000; }
        .tile[data-color="سوور"] { color: #c33; border-left: 5px solid #c33; }
        .tile[data-color="شین"] { color: #36c; border-left: 5px solid #36c; }
        .tile[data-color="زەرد"] { color: #ca0; border-left: 5px solid #ca0; }
        
        .discard-pile {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .discard-pile #discardPile {
            display: flex;
            justify-content: center;
            min-height: 80px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: #ffd700;
            color: #1a472a;
        }
        
        button:hover:not(:disabled) {
            transform: scale(1.05);
            background: #ffea80;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
            font-size: 16px;
        }
        
        .points-badge {
            background: #ffd700;
            color: #1a472a;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        @media (max-width: 900px) {
            .players-area {
                grid-template-columns: 1fr;
            }
            .tile {
                width: 45px;
                height: 60px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 یاری Okay (پۆل)</h1>
        
        <div class="game-info">
            <div>🎴 پۆل لە دەست: <span id="handCount">-</span></div>
            <div>🃏 جۆکەر: <span id="jokerTile">-</span></div>
            <div>📌 پۆلی ئاشکرا: <span id="openTile">-</span></div>
            <div>👤 یاریزانی ئێستا: <span id="currentPlayer">١</span></div>
        </div>
        
        <div class="players-area" id="playersArea">
            <!-- players will be added by JS -->
        </div>
        
        <div class="discard-pile">
            <h3>🗑️ پۆلی فڕێدراو</h3>
            <div id="discardPile"></div>
        </div>
        
        <div class="controls">
            <button id="drawBtn">🎴 هەڵگرتنی پۆل</button>
            <button id="discardBtn" disabled>🗑️ فڕێدان</button>
            <button id="meldBtn" disabled>✨ دابەزین</button>
            <button id="resetBtn">🔄 یاری نوێ</button>
        </div>
        
        <div class="message" id="message">👋 کلیک لەسەر پۆلێک بکە بۆ هەڵبژاردن، پاشان کلیک لە فڕێدان</div>
    </div>
    
    <script>
        // ==================== کلاسەکان ====================
        class Tile {
            constructor(color, number, isJoker = false) {
                this.color = color;
                this.number = number;
                this.isJoker = isJoker;
            }
            
            getPoints() {
                if (this.isJoker) return 25;
                if ([1, 10, 11, 12, 13].includes(this.number)) return 10;
                return this.number;
            }
            
            toString() {
                if (this.isJoker) return "🃏 جۆکەر";
                return `${this.color} ${this.number}`;
            }
            
            getShortName() {
                if (this.isJoker) return "🃏";
                return `${this.color.slice(0,1)}${this.number}`;
            }
            
            isEqual(other) {
                if (!other) return false;
                if (this.isJoker || other.isJoker) return false;
                return this.color === other.color && this.number === other.number;
            }
        }
        
        // ==================== یاری سەرەکی ====================
        class Game {
            constructor() {
                this.colors = ["ڕەش", "سوور", "شین", "زەرد"];
                this.tiles = [];
                this.players = [[], [], [], []];
                this.melds = [[], [], [], []];
                this.discardPile = [];
                this.openTile = null;
                this.jokerTile = null;
                this.currentPlayer = 0;
                this.gamePhase = "draw"; // draw, discard
                this.selectedTileIndex = -1;
                this.winner = -1;
                this.hasDrawn = false;
                this.hasMeldThisTurn = false;
            }
            
            createAllTiles() {
                this.tiles = [];
                // 4 colors, numbers 1-13, each twice
                for (let color of this.colors) {
                    for (let num = 1; num <= 13; num++) {
                        for (let i = 0; i < 2; i++) {
                            this.tiles.push(new Tile(color, num, false));
                        }
                    }
                }
                // Add 2 jokers
                for (let i = 0; i < 2; i++) {
                    this.tiles.push(new Tile(null, null, true));
                }
            }
            
            shuffle() {
                for (let i = this.tiles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.tiles[i], this.tiles[j]] = [this.tiles[j], this.tiles[i]];
                }
            }
            
            deal() {
                this.players = [[], [], [], []];
                // Player 0 gets 15 tiles, others get 14
                for (let i = 0; i < 4; i++) {
                    let count = i === 0 ? 15 : 14;
                    for (let j = 0; j < count; j++) {
                        this.players[i].push(this.tiles.pop());
                    }
                }
                // Open tile
                this.openTile = this.tiles.pop();
                this.setJokerFromOpenTile();
            }
            
            setJokerFromOpenTile() {
                if (this.openTile.isJoker) {
                    this.jokerTile = new Tile(null, null, true);
                } else {
                    let newNumber = this.openTile.number - 1;
                    if (newNumber === 0) newNumber = 13;
                    this.jokerTile = new Tile(this.openTile.color, newNumber, false);
                }
            }
            
            getHandPoints(playerIndex) {
                let total = 0;
                for (let tile of this.players[playerIndex]) {
                    total += tile.getPoints();
                }
                return total;
            }
            
            canMeld(playerIndex) {
                return this.getHandPoints(playerIndex) >= 81;
            }
            
            checkValidRun(tiles) {
                if (tiles.length < 3) return false;
                // Check if all same color
                let color = tiles[0].color;
                for (let t of tiles) {
                    if (t.isJoker) continue;
                    if (t.color !== color) return false;
                }
                // Get numbers
                let numbers = [];
                for (let t of tiles) {
                    if (t.isJoker) {
                        numbers.push(null);
                    } else {
                        numbers.push(t.number);
                    }
                }
                // Sort numbers
                let sorted = [...numbers].sort((a,b) => {
                    if (a === null) return 1;
                    if (b === null) return -1;
                    return a - b;
                });
                // Check sequence
                let nonJokers = sorted.filter(n => n !== null);
                for (let i = 0; i < nonJokers.length - 1; i++) {
                    let diff = nonJokers[i+1] - nonJokers[i];
                    if (diff !== 1) {
                        // Check wrap around (1,12,13)
                        if (nonJokers[i] === 12 && nonJokers[i+1] === 13) continue;
                        if (nonJokers[i] === 13 && nonJokers[i+1] === 1) continue;
                        return false;
                    }
                }
                return true;
            }
            
            checkValidSet(tiles) {
                if (tiles.length < 3 || tiles.length > 4) return false;
                let number = null;
                for (let t of tiles) {
                    if (t.isJoker) continue;
                    if (number === null) number = t.number;
                    if (t.number !== number) return false;
                }
                // Check different colors
                let colors = new Set();
                for (let t of tiles) {
                    if (t.isJoker) continue;
                    if (colors.has(t.color)) return false;
                    colors.add(t.color);
                }
                return true;
            }
            
            performMeld(playerIndex) {
                // This is simplified - in real game, player selects which tiles to meld
                // For now, just check if they can meld
                if (this.canMeld(playerIndex) && !this.hasMeldThisTurn) {
                    this.melds[playerIndex].push(...this.players[playerIndex]);
                    this.players[playerIndex] = [];
                    this.hasMeldThisTurn = true;
                    return true;
                }
                return false;
            }
            
            drawFromPile() {
                if (this.gamePhase !== "draw") return false;
                if (this.tiles.length === 0) return false;
                let tile = this.tiles.pop();
                this.players[this.currentPlayer].push(tile);
                this.hasDrawn = true;
                this.gamePhase = "discard";
                return true;
            }
            
            drawFromDiscard() {
                if (this.gamePhase !== "draw") return false;
                if (this.discardPile.length === 0) return false;
                let tile = this.discardPile.pop();
                this.players[this.currentPlayer].push(tile);
                this.hasDrawn = true;
                this.gamePhase = "discard";
                return true;
            }
            
            discardTile(index) {
                if (this.gamePhase !== "discard") return false;
                if (index < 0 || index >= this.players[this.currentPlayer].length) return false;
                
                let tile = this.players[this.currentPlayer].splice(index, 1)[0];
                this.discardPile.push(tile);
                
                // Check win
                if (this.players[this.currentPlayer].length === 0) {
                    this.winner = this.currentPlayer;
                    return true;
                }
                
                // Next player
                this.currentPlayer = (this.currentPlayer + 1) % 4;
                this.gamePhase = "draw";
                this.hasDrawn = false;
                this.hasMeldThisTurn = false;
                this.selectedTileIndex = -1;
                return true;
            }
            
            reset() {
                this.createAllTiles();
                this.shuffle();
                this.deal();
                this.discardPile = [];
                this.melds = [[], [], [], []];
                this.currentPlayer = 0;
                this.gamePhase = "draw";
                this.winner = -1;
                this.hasDrawn = false;
                this.hasMeldThisTurn = false;
                this.selectedTileIndex = -1;
            }
        }
        
        // ==================== UI ====================
        let game = new Game();
        
        function renderTile(tile, index, isSelected = false, isInHand = true) {
            let colorClass = tile.isJoker ? "joker" : "";
            let colorAttr = tile.color || "";
            let text = tile.getShortName();
            let selectedClass = isSelected ? "selected" : "";
            return `<div class="tile ${colorClass} ${selectedClass}" data-color="${colorAttr}" data-index="${index}" data-inhand="${isInHand}">
                        ${text}
                    </div>`;
        }
        
        function render() {
            // Update game info
            let currentPlayerHand = game.players[game.currentPlayer];
            document.getElementById("handCount").innerHTML = currentPlayerHand.length;
            document.getElementById("jokerTile").innerHTML = game.jokerTile ? game.jokerTile.toString() : "-";
            document.getElementById("openTile").innerHTML = game.openTile ? game.openTile.toString() : "-";
            document.getElementById("currentPlayer").innerHTML = game.currentPlayer + 1;
            
            // Render players
            let playersArea = document.getElementById("playersArea");
            playersArea.innerHTML = "";
            
            for (let i = 0; i < 4; i++) {
                let playerDiv = document.createElement("div");
                playerDiv.className = `player ${i === game.currentPlayer ? "active" : ""}`;
                
                let points = game.getHandPoints(i);
                let canMeld = game.canMeld(i);
                let meldBadge = canMeld ? '<span class="points-badge" style="background:#4caf50;">✨ دەتوانێت دابەزێت</span>' : `<span class="points-badge">${points} خاڵ</span>`;
                
                playerDiv.innerHTML = `
                    <h3>یاریزان ${i+1} ${meldBadge}</h3>
                    <div class="hand" id="player${i}-hand"></div>
                    <div class="meld-area" id="player${i}-meld"></div>
                `;
                playersArea.appendChild(playerDiv);
                
                // Render hand
                let handDiv = document.getElementById(`player${i}-hand`);
                if (i === game.currentPlayer) {
                    for (let j = 0; j < game.players[i].length; j++) {
                        handDiv.innerHTML += renderTile(game.players[i][j], j, j === game.selectedTileIndex, true);
                    }
                } else {
                    // Hide other players' tiles
                    handDiv.innerHTML = `<div style="padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px;">🔒 ${game.players[i].length} پۆل</div>`;
                }
                
                // Render meld area
                let meldDiv = document.getElementById(`player${i}-meld`);
                if (game.melds[i].length > 0) {
                    for (let j = 0; j < game.melds[i].length; j++) {
                        meldDiv.innerHTML += renderTile(game.melds[i][j], j, false, false);
                    }
                } else {
                    meldDiv.innerHTML = '<span style="opacity:0.5;">- دابەزین نییە -</span>';
                }
            }
            
            // Render discard pile
            let discardDiv = document.getElementById("discardPile");
            discardDiv.innerHTML = "";
            if (game.discardPile.length > 0) {
                let lastTile = game.discardPile[game.discardPile.length - 1];
                discardDiv.innerHTML = renderTile(lastTile, 0, false, false);
                if (game.discardPile.length > 1) {
                    discardDiv.innerHTML += `<span style="margin-left: 10px;">+${game.discardPile.length-1} تر</span>`;
                }
            } else {
                discardDiv.innerHTML = "<span style='opacity:0.5;'>- بەتاڵ -</span>";
            }
            
            // Update buttons
            let drawBtn = document.getElementById("drawBtn");
            let discardBtn = document.getElementById("discardBtn");
            let meldBtn = document.getElementById("meldBtn");
            
            drawBtn.disabled = game.gamePhase !== "draw" || game.winner !== -1;
            discardBtn.disabled = game.gamePhase !== "discard" || game.selectedTileIndex === -1 || game.winner !== -1;
            meldBtn.disabled = game.gamePhase !== "discard" || !game.canMeld(game.currentPlayer) || game.hasMeldThisTurn || game.winner !== -1;
            
            // Message
            let msgDiv = document.getElementById("message");
            if (game.winner !== -1) {
                msgDiv.innerHTML = `🎉 براوە! یاریزان ${game.winner+1} سەرکەوت! 🎉`;
                msgDiv.style.background = "#4caf50";
            } else {
                msgDiv.style.background = "rgba(0,0,0,0.7)";
                if (game.gamePhase === "draw") {
                    msgDiv.innerHTML = "🎴 کلیک لە 'هەڵگرتنی پۆل' بکە یان کلیک لە پۆلی فڕێدراو بکە بۆ هەڵگرتن";
                } else {
                    msgDiv.innerHTML = "🗑️ پۆلێک هەڵبژێرە و کلیک لە 'فڕێدان' بکە | ✨ ئەگەر خاڵت ٨١ یان زیاترە دەتوانیت دابەزیت";
                }
            }
        }
        
        function handleTileClick(e) {
            let target = e.target.closest(".tile");
            if (!target) return;
            
            let isInHand = target.dataset.inhand === "true";
            let index = parseInt(target.dataset.index);
            
            if (game.gamePhase === "discard" && game.selectedTileIndex === -1 && isInHand) {
                game.selectedTileIndex = index;
                render();
            } else if (game.gamePhase === "discard" && game.selectedTileIndex !== -1 && isInHand) {
                game.selectedTileIndex = -1;
                render();
            }
        }
        
        function handleDiscardPileClick() {
            if (game.gamePhase === "draw" && game.winner === -1) {
                game.drawFromDiscard();
                render();
            }
        }
        
        document.getElementById("drawBtn").onclick = () => {
            if (game.gamePhase === "draw" && game.winner === -1) {
                game.drawFromPile();
                render();
            }
        };
        
        document.getElementById("discardBtn").onclick = () => {
            if (game.gamePhase === "discard" && game.selectedTileIndex !== -1 && game.winner === -1) {
                let result = game.discardTile(game.selectedTileIndex);
                render();
            }
        };
        
        document.getElementById("meldBtn").onclick = () => {
            if (game.gamePhase === "discard" && game.canMeld(game.currentPlayer) && !game.hasMeldThisTurn && game.winner === -1) {
                game.performMeld(game.currentPlayer);
                render();
            }
        };
        
        document.getElementById("resetBtn").onclick = () => {
            game.reset();
            render();
        };
        
        document.getElementById("playersArea").addEventListener("click", handleTileClick);
        document.getElementById("discardPile").addEventListener("click", handleDiscardPileClick);
        
        // Start game
        game.reset();
        render();
    </script>
</body>
</html>
