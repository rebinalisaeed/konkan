<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Okey Plus - یاری پۆل</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a472a;
            font-family: 'Segoe UI', 'Tahoma', 'Vazirmatn', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        
        /* مێزە سەرەکیەکە */
        .game-container {
            position: relative;
            width: 1300px;
            max-width: 95vw;
            height: 850px;
            max-height: 90vh;
            background: radial-gradient(circle at 30% 40%, #2d6a4f, #1b4d2e);
            border-radius: 180px;
            box-shadow: 
                inset 0 0 60px rgba(0,0,0,0.5),
                0 25px 50px rgba(0,0,0,0.4),
                0 0 0 12px #c97e3a,
                0 0 0 20px #9b5e2c;
            overflow: hidden;
        }
        
        /* پۆزیشنی یاریزانان - چوار لای مێز */
        .players-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        /* یاریزانی خوارەوە (یاریزانی ئێستا) */
        .player-bottom {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 10;
        }
        
        /* یاریزانی سەرەوە */
        .player-top {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 10;
        }
        
        /* یاریزانی لای ڕاست */
        .player-right {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }
        
        /* یاریزانی لای چەپ */
        .player-left {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }
        
        /* کارتی یاریزان */
        .player-card {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 12px;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            min-width: 200px;
        }
        
        .player-bottom .player-card {
            background: rgba(0,0,0,0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .player-card.active {
            background: rgba(255,215,0,0.3);
            box-shadow: 0 0 0 3px #ffd966, 0 0 0 6px rgba(255,215,0,0.3);
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 8px;
        }
        
        .player-name {
            font-weight: bold;
            color: #ffefc0;
            background: rgba(0,0,0,0.6);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
        }
        
        .points-badge {
            background: #ffd966;
            color: #2a5a2a;
            padding: 3px 12px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .points-badge.can-meld {
            background: #ffaa33;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* تەختەی پۆل - وەک Okey Plus */
        .tile-rack {
            background: linear-gradient(145deg, #eeddbb, #dbbc87);
            border-radius: 20px 20px 35px 35px;
            padding: 12px 10px 18px 10px;
            box-shadow: 
                inset 0 1px 5px rgba(255,255,200,0.8),
                0 8px 16px rgba(0,0,0,0.3),
                0 0 0 3px #f5e6c8,
                0 0 0 6px #b87c3a;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 110px;
            transition: all 0.2s;
        }
        
        .player-bottom .tile-rack {
            background: linear-gradient(145deg, #f5e6c8, #e6d0a8);
            box-shadow: 
                inset 0 1px 5px rgba(255,255,200,0.9),
                0 8px 20px rgba(0,0,0,0.4),
                0 0 0 4px #ffefc0,
                0 0 0 8px #c98a42;
        }
        
        /* شێوازی پۆل */
        .tile {
            width: 58px;
            height: 75px;
            background: linear-gradient(145deg, #fffcf5, #f5e8da);
            border-radius: 10px;
            box-shadow: -2px 2px 5px rgba(0,0,0,0.2), inset 0 1px 0 white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            font-family: 'Segoe UI', monospace;
            will-change: transform;
        }
        
        /* ئەنیمەیشنی هەڵبژاردن و هەڵگرتن */
        .tile:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.25);
        }
        
        .tile.selected {
            transform: translateY(-16px) scale(1.03);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            filter: brightness(1.05);
        }
        
        /* ئەنیمەیشنی دەرکەوتن */
        @keyframes tileAppear {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .tile {
            animation: tileAppear 0.2s ease-out;
        }
        
        .tile::after {
            content: attr(data-number);
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 11px;
            opacity: 0.7;
            font-weight: normal;
        }
        
        .tile[data-color="ڕەش"] { color: #1e1e2f; border-bottom: 4px solid #1e1e2f; }
        .tile[data-color="سوور"] { color: #d44; border-bottom: 4px solid #d44; }
        .tile[data-color="شین"] { color: #48b; border-bottom: 4px solid #48b; }
        .tile[data-color="زەرد"] { color: #db0; border-bottom: 4px solid #db0; }
        
        .tile.joker {
            background: linear-gradient(145deg, #ffecb3, #ffd966);
            color: #b87c00;
        }
        
        .tile.joker::after {
            content: "🃏";
            font-size: 18px;
            opacity: 1;
        }
        
        /* پشتی پۆل */
        .tile.back {
            background: repeating-linear-gradient(45deg, #b87c4a, #b87c4a 12px, #d69c62 12px, #d69c62 24px);
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.2);
            cursor: default;
        }
        
        .tile.back:hover {
            transform: none;
        }
        
        .tile.back::after {
            content: "?";
            opacity: 0.6;
            color: #f5e6d3;
            font-size: 16px;
        }
        
        /* ناوچەی دابەزین */
        .meld-area {
            background: rgba(0,0,0,0.25);
            border-radius: 16px;
            padding: 8px;
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            min-height: 70px;
            transition: all 0.2s;
        }
        
        .meld-area .tile {
            width: 50px;
            height: 65px;
            font-size: 18px;
            opacity: 0.95;
        }
        
        /* ناوەندی مێز */
        .table-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 40px;
            background: rgba(0,0,0,0.2);
            padding: 20px 35px;
            border-radius: 100px;
            backdrop-filter: blur(5px);
            z-index: 5;
        }
        
        .pile {
            text-align: center;
        }
        
        .pile .tile {
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .pile .tile:hover {
            transform: translateY(-5px);
        }
        
        .pile-label {
            font-size: 11px;
            color: #ffefc0;
            margin-top: 8px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }
        
        .joker-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin-top: -80px;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 12px;
            color: #ffd966;
            white-space: nowrap;
            z-index: 6;
        }
        
        /* دوگمەکان */
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
        }
        
        button {
            background: linear-gradient(180deg, #ffdf9c, #e6b422);
            border: none;
            padding: 8px 22px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 40px;
            color: #2c4a2c;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #b87c00;
            font-family: inherit;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #b87c00;
        }
        
        button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b87c00;
        }
        
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        
        .message {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            padding: 6px 18px;
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
            font-size: 12px;
            color: #ffefb0;
            white-space: nowrap;
            z-index: 20;
            backdrop-filter: blur(4px);
        }
        
        /* وەڵامدانەوە */
        @media (max-width: 1100px) {
            .tile { width: 48px; height: 62px; font-size: 20px; }
            .meld-area .tile { width: 42px; height: 54px; font-size: 16px; }
            .player-card { min-width: 160px; }
            .tile-rack { padding: 8px 6px 12px 6px; gap: 4px; }
            .player-name { font-size: 11px; }
            .points-badge { font-size: 10px; }
        }
        
        @media (max-width: 900px) {
            .tile { width: 42px; height: 55px; font-size: 16px; }
            .player-left, .player-right { transform: translateY(-50%) scale(0.9); }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="players-wrapper">
        
        <!-- یاریزانی سەرەوە -->
        <div class="player-top" id="playerTop"></div>
        
        <!-- یاریزانی لای ڕاست -->
        <div class="player-right" id="playerRight"></div>
        
        <!-- یاریزانی لای چەپ -->
        <div class="player-left" id="playerLeft"></div>
        
        <!-- یاریزانی خوارەوە -->
        <div class="player-bottom" id="playerBottom"></div>
        
        <!-- ناوەندی مێز -->
        <div class="table-center">
            <div class="pile">
                <div class="tile back" id="drawPileTile">?</div>
                <div class="pile-label">📦 قاچ</div>
            </div>
            <div class="pile">
                <div id="discardTile"></div>
                <div class="pile-label">🗑️ فڕێدراو</div>
            </div>
        </div>
        
        <div class="joker-indicator" id="jokerIndicator">🃏 جۆکەر: -</div>
        
        <!-- دوگمەکان -->
        <div class="controls">
            <button id="drawBtn">🎴 هەڵگرتن</button>
            <button id="discardBtn" disabled>🗑️ فڕێدان</button>
            <button id="meldBtn" disabled>✨ دابەزین</button>
            <button id="resetBtn">🔄 یاری نوێ</button>
        </div>
        
        <div class="message" id="message">👋 کلیک لەسەر پۆلێک بکە بۆ هەڵبژاردن</div>
    </div>
</div>

<script>
    // ==================== کلاس ====================
    class Tile {
        constructor(color, number, isJoker = false) {
            this.color = color;
            this.number = number;
            this.isJoker = isJoker;
        }
        
        getPoints() {
            if (this.isJoker) return 25;
            if ([1, 10, 11, 12, 13].includes(this.number)) return 10;
            return this.number;
        }
        
        getShortName() {
            if (this.isJoker) return "🃏";
            return `${this.number}`;
        }
        
        clone() {
            return new Tile(this.color, this.number, this.isJoker);
        }
    }
    
    // ==================== یاری ====================
    class Game {
        constructor() {
            this.colors = ["ڕەش", "سوور", "شین", "زەرد"];
            this.tiles = [];
            this.players = [[], [], [], []];
            this.melds = [[], [], [], []];
            this.discardPile = [];
            this.openTile = null;
            this.jokerTile = null;
            this.currentPlayer = 0;
            this.gamePhase = "draw";
            this.selectedTileIndex = -1;
            this.winner = -1;
            this.hasDrawn = false;
            this.hasMeldThisTurn = false;
        }
        
        createAllTiles() {
            this.tiles = [];
            for (let color of this.colors) {
                for (let num = 1; num <= 13; num++) {
                    for (let i = 0; i < 2; i++) {
                        this.tiles.push(new Tile(color, num, false));
                    }
                }
            }
            for (let i = 0; i < 2; i++) {
                this.tiles.push(new Tile(null, null, true));
            }
        }
        
        shuffle() {
            for (let i = this.tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [this.tiles[i], this.tiles[j]] = [this.tiles[j], this.tiles[i]];
            }
        }
        
        deal() {
            this.players = [[], [], [], []];
            for (let i = 0; i < 4; i++) {
                let count = i === 0 ? 15 : 14;
                for (let j = 0; j < count; j++) {
                    this.players[i].push(this.tiles.pop());
                }
            }
            this.openTile = this.tiles.pop();
            this.setJokerFromOpenTile();
        }
        
        setJokerFromOpenTile() {
            if (this.openTile.isJoker) {
                this.jokerTile = new Tile(null, null, true);
            } else {
                let newNumber = this.openTile.number - 1;
                if (newNumber === 0) newNumber = 13;
                this.jokerTile = new Tile(this.openTile.color, newNumber, false);
            }
        }
        
        getHandPoints(playerIndex) {
            let total = 0;
            for (let tile of this.players[playerIndex]) {
                total += tile.getPoints();
            }
            return total;
        }
        
        canMeld(playerIndex) {
            return this.getHandPoints(playerIndex) >= 81;
        }
        
        performMeld(playerIndex) {
            if (this.canMeld(playerIndex) && !this.hasMeldThisTurn) {
                this.melds[playerIndex].push(...this.players[playerIndex]);
                this.players[playerIndex] = [];
                this.hasMeldThisTurn = true;
                return true;
            }
            return false;
        }
        
        drawFromPile() {
            if (this.gamePhase !== "draw") return false;
            if (this.tiles.length === 0) return false;
            let tile = this.tiles.pop();
            this.players[this.currentPlayer].push(tile);
            this.hasDrawn = true;
            this.gamePhase = "discard";
            return true;
        }
        
        drawFromDiscard() {
            if (this.gamePhase !== "draw") return false;
            if (this.discardPile.length === 0) return false;
            let tile = this.discardPile.pop();
            this.players[this.currentPlayer].push(tile);
            this.hasDrawn = true;
            this.gamePhase = "discard";
            return true;
        }
        
        discardTile(index) {
            if (this.gamePhase !== "discard") return false;
            if (index < 0 || index >= this.players[this.currentPlayer].length) return false;
            
            let tile = this.players[this.currentPlayer].splice(index, 1)[0];
            this.discardPile.push(tile);
            
            if (this.players[this.currentPlayer].length === 0) {
                this.winner = this.currentPlayer;
                return true;
            }
            
            this.currentPlayer = (this.currentPlayer + 1) % 4;
            this.gamePhase = "draw";
            this.hasDrawn = false;
            this.hasMeldThisTurn = false;
            this.selectedTileIndex = -1;
            return true;
        }
        
        reset() {
            this.createAllTiles();
            this.shuffle();
            this.deal();
            this.discardPile = [];
            this.melds = [[], [], [], []];
            this.currentPlayer = 0;
            this.gamePhase = "draw";
            this.winner = -1;
            this.hasDrawn = false;
            this.hasMeldThisTurn = false;
            this.selectedTileIndex = -1;
        }
    }
    
    // ==================== UI ====================
    let game = new Game();
    
    function renderTile(tile, index, isSelected = false, isBack = false) {
        if (isBack) {
            return `<div class="tile back" data-index="${index}" data-isback="true">?</div>`;
        }
        if (!tile) return '';
        let colorClass = tile.isJoker ? "joker" : "";
        let colorAttr = tile.color || "";
        let selectedClass = isSelected ? "selected" : "";
        let numberAttr = tile.isJoker ? "" : (tile.number || "");
        return `<div class="tile ${colorClass} ${selectedClass}" data-color="${colorAttr}" data-index="${index}" data-number="${numberAttr}">
                    ${tile.getShortName()}
                </div>`;
    }
    
    function render() {
        // جۆکەر
        let jokerText = game.jokerTile ? 
            (game.jokerTile.isJoker ? "🃏 جۆکەر" : `${game.jokerTile.color} ${game.jokerTile.number}`) : "-";
        document.getElementById("jokerIndicator").innerHTML = `🃏 جۆکەر: ${jokerText}`;
        
        // قاچ
        let drawDiv = document.getElementById("drawPileTile");
        if (drawDiv) {
            drawDiv.innerHTML = game.tiles.length > 0 ? "?" : "🔒";
            drawDiv.className = `tile back ${game.tiles.length === 0 ? "disabled" : ""}`;
        }
        
        // فڕێدراو
        let discardDiv = document.getElementById("discardTile");
        if (discardDiv && game.discardPile.length > 0) {
            let lastTile = game.discardPile[game.discardPile.length - 1];
            discardDiv.innerHTML = renderTile(lastTile, 0, false, false);
        } else if (discardDiv) {
            discardDiv.innerHTML = '<div class="tile back" style="opacity:0.5;">-</div>';
        }
        
        // پۆزیشنی یاریزانان: [0]خوارەوە, [1]ڕاست, [2]سەرەوە, [3]چەپ
        const positions = ["playerBottom", "playerRight", "playerTop", "playerLeft"];
        const playerNames = ["یاریزان ١", "یاریزان ٢", "یاریزان ٣", "یاریزان ٤"];
        
        for (let i = 0; i < 4; i++) {
            let container = document.getElementById(positions[i]);
            if (!container) continue;
            
            let isCurrent = (i === game.currentPlayer);
            let hand = game.players[i];
            let meld = game.melds[i];
            let points = game.getHandPoints(i);
            let canMeld = game.canMeld(i);
            
            // تەختەی پۆل
            let handHtml = '';
            if (isCurrent) {
                for (let j = 0; j < hand.length; j++) {
                    handHtml += renderTile(hand[j], j, j === game.selectedTileIndex, false);
                }
            } else {
                for (let j = 0; j < hand.length; j++) {
                    handHtml += renderTile(null, j, false, true);
                }
            }
            
            // ناوچەی دابەزین
            let meldHtml = '';
            if (meld.length > 0) {
                for (let j = 0; j < meld.length; j++) {
                    meldHtml += renderTile(meld[j], j, false, false);
                }
            } else {
                meldHtml = '<span style="opacity:0.5; font-size:11px;">- دابەزین نییە -</span>';
            }
            
            let pointsClass = canMeld ? "points-badge can-meld" : "points-badge";
            let pointsText = canMeld ? `✨ ${points} خاڵ` : `${points} خاڵ`;
            
            container.innerHTML = `
                <div class="player-card ${isCurrent ? 'active' : ''}">
                    <div class="player-header">
                        <span class="player-name">👤 ${playerNames[i]}</span>
                        <span class="${pointsClass}">${pointsText}</span>
                    </div>
                    <div class="tile-rack">
                        ${handHtml || '<span style="opacity:0.5; font-size:12px;">- بەتاڵ -</span>'}
                    </div>
                    <div class="meld-area">
                        ${meldHtml}
                    </div>
                </div>
            `;
        }
        
        // دوگمەکان
        document.getElementById("drawBtn").disabled = game.gamePhase !== "draw" || game.winner !== -1;
        document.getElementById("discardBtn").disabled = game.gamePhase !== "discard" || game.selectedTileIndex === -1 || game.winner !== -1;
        document.getElementById("meldBtn").disabled = game.gamePhase !== "discard" || !game.canMeld(game.currentPlayer) || game.hasMeldThisTurn || game.winner !== -1;
        
        let msgDiv = document.getElementById("message");
        if (game.winner !== -1) {
            msgDiv.innerHTML = `🎉 براوە! یاریزان ${game.winner+1} سەرکەوت! 🎉`;
            msgDiv.style.background = "#4caf50";
        } else {
            msgDiv.style.background = "rgba(0,0,0,0.7)";
            if (game.gamePhase === "draw") {
                msgDiv.innerHTML = "🎴 کلیک لە 'هەڵگرتن' یان کلیک لە پۆلی فڕێدراو بکە";
            } else {
                msgDiv.innerHTML = "🗑️ پۆلێک هەڵبژێرە و کلیک لە 'فڕێدان' بکە | ✨ ئەگەر خاڵت ≥ ٨١ بێت دەتوانیت دابەزیت";
            }
        }
    }
    
    // ==================== Event Listeners ====================
    function handleTileClick(e) {
        let target = e.target.closest(".tile");
        if (!target) return;
        
        let isBack = target.dataset.isback === "true";
        if (isBack) return;
        
        let index = parseInt(target.dataset.index);
        if (isNaN(index)) return;
        
        if (game.gamePhase === "discard" && game.selectedTileIndex === -1) {
            game.selectedTileIndex = index;
            render();
        } else if (game.gamePhase === "discard" && game.selectedTileIndex !== -1) {
            game.selectedTileIndex = -1;
            render();
        }
    }
    
    function handleDiscardPileClick() {
        if (game.gamePhase === "draw" && game.winner === -1) {
            game.drawFromDiscard();
            render();
        }
    }
    
    function handleDrawPileClick() {
        if (game.gamePhase === "draw" && game.winner === -1) {
            game.drawFromPile();
            render();
        }
    }
    
    document.getElementById("drawBtn").onclick = () => {
        if (game.gamePhase === "draw" && game.winner === -1) {
            game.drawFromPile();
            render();
        }
    };
    
    document.getElementById("discardBtn").onclick = () => {
        if (game.gamePhase === "discard" && game.selectedTileIndex !== -1 && game.winner === -1) {
            game.discardTile(game.selectedTileIndex);
            render();
        }
    };
    
    document.getElementById("meldBtn").onclick = () => {
        if (game.gamePhase === "discard" && game.canMeld(game.currentPlayer) && !game.hasMeldThisTurn && game.winner === -1) {
            game.performMeld(game.currentPlayer);
            render();
        }
    };
    
    document.getElementById("resetBtn").onclick = () => {
        game.reset();
        render();
    };
    
    document.getElementById("discardTile")?.addEventListener("click", handleDiscardPileClick);
    document.getElementById("drawPileTile")?.addEventListener("click", handleDrawPileClick);
    document.querySelector(".players-wrapper")?.addEventListener("click", handleTileClick);
    
    // دەستپێکردن
    game.reset();
    render();
</script>
</body>
</html>
