<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>یاری Okay - پۆل</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: #2b4b2b;
            font-family: 'Segoe UI', 'Tahoma', 'Vazirmatn', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* مێزەکە */
        .table {
            width: 1300px;
            max-width: 98vw;
            height: 800px;
            max-height: 90vh;
            background: radial-gradient(circle at 30% 40%, #2a6b2a, #1a3a1a);
            border-radius: 120px;
            box-shadow: 
                inset 0 0 50px rgba(0,0,0,0.4),
                0 20px 40px rgba(0,0,0,0.3),
                0 0 0 20px #8b5a2b,
                0 0 0 25px #c97e3a;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* ناوەڕۆکی مێز */
        .table-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }
        
        /* یاریزانی سەرەوە */
        .player-top {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        /* ناوەڕاست - قاچ و پۆلی فڕێدراو */
        .table-center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.15);
            border-radius: 80px;
            margin: 10px 40px;
            backdrop-filter: blur(3px);
        }
        
        /* یاریزانی خوارەوە (یاریزانی ئێستا) */
        .player-bottom {
            margin-top: 20px;
        }
        
        /* ڕێکخستنی یاریزانانی لای ڕاست و چەپ */
        .players-sides {
            display: flex;
            justify-content: space-between;
            flex: 1;
            gap: 20px;
            margin: 10px 0;
        }
        
        .player-left, .player-right {
            width: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .player-left .tiles-container,
        .player-right .tiles-container {
            transform: rotate(90deg);
        }
        
        /* تەخەی پۆل (Tile Rack) */
        .tiles-container {
            background: linear-gradient(145deg, #c9a87b, #b58b54);
            border-radius: 20px 20px 40px 40px;
            padding: 12px 20px;
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.5),
                0 8px 15px rgba(0,0,0,0.3),
                0 0 0 3px #e9c891,
                0 0 0 6px #a56b2f;
            display: inline-flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            min-height: 100px;
        }
        
        .player-bottom .tiles-container {
            background: linear-gradient(145deg, #e6c394, #c9a05e);
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.6),
                0 8px 20px rgba(0,0,0,0.4),
                0 0 0 4px #ffdfa5,
                0 0 0 8px #b87c3a;
        }
        
        /* شێوازی پۆل */
        .tile {
            width: 55px;
            height: 70px;
            background: linear-gradient(145deg, #fffaf0, #f5e6d3);
            border-radius: 8px;
            box-shadow: -2px 2px 3px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.8);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            font-family: monospace;
        }
        
        /* دانانی ژمارە بچووک لە خوارەوە */
        .tile::after {
            content: attr(data-number);
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 12px;
            opacity: 0.6;
            font-weight: normal;
        }
        
        .tile[data-color="ڕەش"] { color: #111; border-bottom: 3px solid #111; }
        .tile[data-color="سوور"] { color: #d44; border-bottom: 3px solid #d44; }
        .tile[data-color="شین"] { color: #48b; border-bottom: 3px solid #48b; }
        .tile[data-color="زەرد"] { color: #ca0; border-bottom: 3px solid #ca0; }
        
        .tile.joker {
            background: linear-gradient(145deg, #ffdf80, #ffc34d);
            color: #8b5a00;
        }
        
        .tile.joker::after {
            content: "🃏";
            font-size: 18px;
            opacity: 1;
        }
        
        .tile.selected {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            filter: brightness(1.05);
        }
        
        .tile.back {
            background: repeating-linear-gradient(45deg, #8b6946, #8b6946 10px, #a87c4a 10px, #a87c4a 20px);
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.2);
        }
        
        .tile.back::after {
            content: "?";
            opacity: 0.5;
            color: #fff;
        }
        
        /* ناوی یاریزان */
        .player-name {
            text-align: center;
            margin-bottom: 8px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            color: #ffefc0;
        }
        
        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }
        
        .points-badge {
            background: #ffd966;
            color: #2c4a2c;
            padding: 3px 10px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: bold;
        }
        
        /* دابەزین (meld) */
        .meld-area {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 8px;
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 70px;
        }
        
        .meld-area .tile {
            width: 48px;
            height: 62px;
            font-size: 16px;
            background: linear-gradient(145deg, #fff0df, #eeddbb);
            opacity: 0.9;
        }
        
        /* قاچ و پۆلی فڕێدراو */
        .draw-pile, .discard-pile {
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 50px;
            min-width: 100px;
        }
        
        .draw-pile .tile, .discard-pile .tile {
            cursor: pointer;
        }
        
        .pile-label {
            font-size: 12px;
            margin-top: 5px;
            color: #ffefc0;
        }
        
        /* دوگمەکان */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(180deg, #ffdf9c, #e6b422);
            border: none;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 40px;
            color: #2c4a2c;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #b87c00;
            font-family: inherit;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #b87c00;
        }
        
        button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b87c00;
        }
        
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        
        .message {
            text-align: center;
            padding: 8px;
            margin-top: 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            font-size: 13px;
            color: #ffefb0;
        }
        
        /* وەڵامدانەوە بۆ مۆبایل */
        @media (max-width: 800px) {
            .tile { width: 42px; height: 55px; font-size: 14px; }
            .meld-area .tile { width: 38px; height: 48px; font-size: 12px; }
            .player-left, .player-right { width: 100px; }
            .table-center { gap: 20px; }
            button { padding: 6px 12px; font-size: 12px; }
        }
        
        /* یاریزانی چالاک */
        .player-active .tiles-container {
            box-shadow: 0 0 0 3px #ffd966, 0 0 0 6px #ffaa33;
        }
        
        .player-active .player-name {
            background: #ffd966;
            color: #2a5a2a;
        }
    </style>
</head>
<body>
<div class="table">
    <div class="table-content">
        
        <!-- یاریزانی سەرەوە -->
        <div class="player-top" id="playerTop">
            <!-- JS دەنووسێت -->
        </div>
        
        <!-- یاریزانی لای ڕاست و چەپ -->
        <div class="players-sides">
            <div class="player-left" id="playerLeft"></div>
            <div class="table-center">
                <div class="draw-pile">
                    <div class="tile back" id="drawPileTile">?</div>
                    <div class="pile-label">📦 قاچ</div>
                </div>
                <div class="discard-pile">
                    <div id="discardTile"></div>
                    <div class="pile-label">🗑️ فڕێدراو</div>
                </div>
            </div>
            <div class="player-right" id="playerRight"></div>
        </div>
        
        <!-- یاریزانی خوارەوە (یاریزانی ئێستا) -->
        <div class="player-bottom" id="playerBottom"></div>
        
        <!-- دوگمەکان -->
        <div class="controls">
            <button id="drawBtn">🎴 هەڵگرتن</button>
            <button id="discardBtn" disabled>🗑️ فڕێدان</button>
            <button id="meldBtn" disabled>✨ دابەزین</button>
            <button id="resetBtn">🔄 یاری نوێ</button>
        </div>
        
        <div class="message" id="message">👋 کلیک لەسەر پۆلێک بکە بۆ هەڵبژاردن، پاشان فڕێ بدە</div>
    </div>
</div>

<script>
    // ==================== کلاسەکان ====================
    class Tile {
        constructor(color, number, isJoker = false) {
            this.color = color;
            this.number = number;
            this.isJoker = isJoker;
        }
        
        getPoints() {
            if (this.isJoker) return 25;
            if ([1, 10, 11, 12, 13].includes(this.number)) return 10;
            return this.number;
        }
        
        getShortName() {
            if (this.isJoker) return "🃏";
            return `${this.number}`;
        }
        
        isEqual(other) {
            if (!other) return false;
            if (this.isJoker || other.isJoker) return false;
            return this.color === other.color && this.number === other.number;
        }
    }
    
    // ==================== یاری سەرەکی ====================
    class Game {
        constructor() {
            this.colors = ["ڕەش", "سوور", "شین", "زەرد"];
            this.tiles = [];
            this.players = [[], [], [], []];
            this.melds = [[], [], [], []];
            this.discardPile = [];
            this.openTile = null;
            this.jokerTile = null;
            this.currentPlayer = 0;
            this.gamePhase = "draw";
            this.selectedTileIndex = -1;
            this.winner = -1;
            this.hasDrawn = false;
            this.hasMeldThisTurn = false;
        }
        
        createAllTiles() {
            this.tiles = [];
            for (let color of this.colors) {
                for (let num = 1; num <= 13; num++) {
                    for (let i = 0; i < 2; i++) {
                        this.tiles.push(new Tile(color, num, false));
                    }
                }
            }
            for (let i = 0; i < 2; i++) {
                this.tiles.push(new Tile(null, null, true));
            }
        }
        
        shuffle() {
            for (let i = this.tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [this.tiles[i], this.tiles[j]] = [this.tiles[j], this.tiles[i]];
            }
        }
        
        deal() {
            this.players = [[], [], [], []];
            for (let i = 0; i < 4; i++) {
                let count = i === 0 ? 15 : 14;
                for (let j = 0; j < count; j++) {
                    this.players[i].push(this.tiles.pop());
                }
            }
            this.openTile = this.tiles.pop();
            this.setJokerFromOpenTile();
        }
        
        setJokerFromOpenTile() {
            if (this.openTile.isJoker) {
                this.jokerTile = new Tile(null, null, true);
            } else {
                let newNumber = this.openTile.number - 1;
                if (newNumber === 0) newNumber = 13;
                this.jokerTile = new Tile(this.openTile.color, newNumber, false);
            }
        }
        
        getHandPoints(playerIndex) {
            let total = 0;
            for (let tile of this.players[playerIndex]) {
                total += tile.getPoints();
            }
            return total;
        }
        
        canMeld(playerIndex) {
            return this.getHandPoints(playerIndex) >= 81;
        }
        
        performMeld(playerIndex) {
            if (this.canMeld(playerIndex) && !this.hasMeldThisTurn) {
                this.melds[playerIndex].push(...this.players[playerIndex]);
                this.players[playerIndex] = [];
                this.hasMeldThisTurn = true;
                return true;
            }
            return false;
        }
        
        drawFromPile() {
            if (this.gamePhase !== "draw") return false;
            if (this.tiles.length === 0) return false;
            let tile = this.tiles.pop();
            this.players[this.currentPlayer].push(tile);
            this.hasDrawn = true;
            this.gamePhase = "discard";
            return true;
        }
        
        drawFromDiscard() {
            if (this.gamePhase !== "draw") return false;
            if (this.discardPile.length === 0) return false;
            let tile = this.discardPile.pop();
            this.players[this.currentPlayer].push(tile);
            this.hasDrawn = true;
            this.gamePhase = "discard";
            return true;
        }
        
        discardTile(index) {
            if (this.gamePhase !== "discard") return false;
            if (index < 0 || index >= this.players[this.currentPlayer].length) return false;
            
            let tile = this.players[this.currentPlayer].splice(index, 1)[0];
            this.discardPile.push(tile);
            
            if (this.players[this.currentPlayer].length === 0) {
                this.winner = this.currentPlayer;
                return true;
            }
            
            this.currentPlayer = (this.currentPlayer + 1) % 4;
            this.gamePhase = "draw";
            this.hasDrawn = false;
            this.hasMeldThisTurn = false;
            this.selectedTileIndex = -1;
            return true;
        }
        
        reset() {
            this.createAllTiles();
            this.shuffle();
            this.deal();
            this.discardPile = [];
            this.melds = [[], [], [], []];
            this.currentPlayer = 0;
            this.gamePhase = "draw";
            this.winner = -1;
            this.hasDrawn = false;
            this.hasMeldThisTurn = false;
            this.selectedTileIndex = -1;
        }
    }
    
    // ==================== UI ====================
    let game = new Game();
    
    function renderTile(tile, index, isSelected = false, isBack = false) {
        if (isBack) {
            return `<div class="tile back" data-index="${index}" data-isback="true">?</div>`;
        }
        let colorClass = tile.isJoker ? "joker" : "";
        let colorAttr = tile.color || "";
        let selectedClass = isSelected ? "selected" : "";
        let numberAttr = tile.isJoker ? "" : (tile.number || "");
        return `<div class="tile ${colorClass} ${selectedClass}" data-color="${colorAttr}" data-index="${index}" data-number="${numberAttr}" data-isjoker="${tile.isJoker}">
                    ${tile.getShortName()}
                </div>`;
    }
    
    function render() {
        // نمایش قاچ
        let drawDiv = document.getElementById("drawPileTile");
        if (drawDiv) {
            drawDiv.innerHTML = game.tiles.length > 0 ? "?" : "🔒";
            drawDiv.className = `tile back ${game.tiles.length === 0 ? "disabled" : ""}`;
        }
        
        // نمایش پۆلی فڕێدراو
        let discardDiv = document.getElementById("discardTile");
        if (discardDiv && game.discardPile.length > 0) {
            let lastTile = game.discardPile[game.discardPile.length - 1];
            discardDiv.innerHTML = renderTile(lastTile, 0, false, false);
        } else if (discardDiv) {
            discardDiv.innerHTML = '<div class="tile back" style="opacity:0.5;">-</div>';
        }
        
        // ناوی یاریزانان و پێگەکان
        let playersPositions = ["playerTop", "playerRight", "playerBottom", "playerLeft"];
        let playerNames = ["یاریزان ١", "یاریزان ٢", "یاریزان ٣", "یاریزان ٤"];
        
        for (let i = 0; i < 4; i++) {
            let container = document.getElementById(playersPositions[i]);
            if (!container) continue;
            
            let isCurrent = (i === game.currentPlayer);
            let hand = game.players[i];
            let meld = game.melds[i];
            let points = game.getHandPoints(i);
            let canMeld = game.canMeld(i);
            
            let handHtml = '';
            if (isCurrent) {
                for (let j = 0; j < hand.length; j++) {
                    handHtml += renderTile(hand[j], j, j === game.selectedTileIndex, false);
                }
            } else {
                // پشتی پۆل بۆ یاریزانانی تر
                for (let j = 0; j < hand.length; j++) {
                    handHtml += renderTile(null, j, false, true);
                }
            }
            
            let meldHtml = '';
            if (meld.length > 0) {
                for (let j = 0; j < meld.length; j++) {
                    meldHtml += renderTile(meld[j], j, false, false);
                }
            } else {
                meldHtml = '<span style="opacity:0.5; font-size:12px;">- دابەزین نییە -</span>';
            }
            
            let pointsBadge = canMeld ? '<span class="points-badge" style="background:#ffaa33;">✨ دەتوانێت دابەزێت</span>' : `<span class="points-badge">${points} خاڵ</span>`;
            
            container.innerHTML = `
                <div class="player-info">
                    <span class="player-name">${playerNames[i]}</span>
                    ${pointsBadge}
                </div>
                <div class="tiles-container">
                    ${handHtml || '<span style="opacity:0.5; font-size:12px;">- بەتاڵ -</span>'}
                </div>
                <div class="meld-area">
                    ${meldHtml}
                </div>
            `;
            
            // زیادکردنی کلاسی چالاک
            let playerDiv = container.closest ? container.closest('.player-top, .player-left, .player-right, .player-bottom') : container;
            if (playerDiv) {
                if (isCurrent) {
                    playerDiv.classList.add('player-active');
                } else {
                    playerDiv.classList.remove('player-active');
                }
            }
        }
        
        // دوگمەکان
        let drawBtn = document.getElementById("drawBtn");
        let discardBtn = document.getElementById("discardBtn");
        let meldBtn = document.getElementById("meldBtn");
        
        drawBtn.disabled = game.gamePhase !== "draw" || game.winner !== -1;
        discardBtn.disabled = game.gamePhase !== "discard" || game.selectedTileIndex === -1 || game.winner !== -1;
        meldBtn.disabled = game.gamePhase !== "discard" || !game.canMeld(game.currentPlayer) || game.hasMeldThisTurn || game.winner !== -1;
        
        let msgDiv = document.getElementById("message");
        if (game.winner !== -1) {
            msgDiv.innerHTML = `🎉 براوە! یاریزان ${game.winner+1} سەرکەوت! 🎉`;
            msgDiv.style.background = "#4caf50";
        } else {
            msgDiv.style.background = "rgba(0,0,0,0.6)";
            if (game.gamePhase === "draw") {
                msgDiv.innerHTML = "🎴 کلیک لە 'هەڵگرتن' یان کلیک لە پۆلی فڕێدراو بکە";
            } else {
                msgDiv.innerHTML = "🗑️ پۆلێک هەڵبژێرە و کلیک لە 'فڕێدان' بکە | ✨ ئەگەر خاڵت ≥ ٨١ بێت دەتوانیت دابەزیت";
            }
        }
    }
    
    function handleTileClick(e) {
        let target = e.target.closest(".tile");
        if (!target) return;
        
        let isBack = target.dataset.isback === "true";
        if (isBack) return;
        
        let index = parseInt(target.dataset.index);
        
        if (game.gamePhase === "discard" && game.selectedTileIndex === -1 && !isNaN(index)) {
            game.selectedTileIndex = index;
            render();
        } else if (game.gamePhase === "discard" && game.selectedTileIndex !== -1 && !isNaN(index)) {
            game.selectedTileIndex = -1;
            render();
        }
    }
    
    function handleDiscardPileClick() {
        if (game.gamePhase === "draw" && game.winner === -1) {
            game.drawFromDiscard();
            render();
        }
    }
    
    function handleDrawPileClick() {
        if (game.gamePhase === "draw" && game.winner === -1) {
            game.drawFromPile();
            render();
        }
    }
    
    document.getElementById("drawBtn").onclick = () => {
        if (game.gamePhase === "draw" && game.winner === -1) {
            game.drawFromPile();
            render();
        }
    };
    
    document.getElementById("discardBtn").onclick = () => {
        if (game.gamePhase === "discard" && game.selectedTileIndex !== -1 && game.winner === -1) {
            game.discardTile(game.selectedTileIndex);
            render();
        }
    };
    
    document.getElementById("meldBtn").onclick = () => {
        if (game.gamePhase === "discard" && game.canMeld(game.currentPlayer) && !game.hasMeldThisTurn && game.winner === -1) {
            game.performMeld(game.currentPlayer);
            render();
        }
    };
    
    document.getElementById("resetBtn").onclick = () => {
        game.reset();
        render();
    };
    
    document.getElementById("discardTile")?.addEventListener("click", handleDiscardPileClick);
    document.getElementById("drawPileTile")?.addEventListener("click", handleDrawPileClick);
    document.querySelector(".table-content")?.addEventListener("click", handleTileClick);
    
    game.reset();
    render();
</script>
</body>
</html>
