<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>یاری Okay - پۆل</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: #1e3a2e;
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* مێزەکە */
        .table {
            width: 1400px;
            max-width: 98vw;
            background: #2a6b3c;
            border-radius: 60px;
            box-shadow: 
                inset 0 0 30px rgba(0,0,0,0.3),
                0 20px 40px rgba(0,0,0,0.4),
                0 0 0 15px #8b5a2b,
                0 0 0 25px #c97e3a;
            padding: 25px;
            position: relative;
        }
        
        /* ڕیزبەندی یاریزانان */
        .players-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* ڕیزی سەرەوە و خوارەوە */
        .player-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        
        .player-card {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border-radius: 24px;
            padding: 12px;
            transition: all 0.2s;
        }
        
        .player-card.active {
            background: rgba(255,215,0,0.25);
            box-shadow: 0 0 0 2px #ffd966, 0 0 0 5px #ffaa33;
        }
        
        .player-name {
            text-align: center;
            font-weight: bold;
            color: #ffefc0;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            width: auto;
            padding: 4px 16px;
            border-radius: 30px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 8px;
        }
        
        .points-badge {
            background: #ffd966;
            color: #2a5a2a;
            padding: 3px 12px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: bold;
        }
        
        /* تەختەی پۆل - شێوازی وێنەکە */
        .tile-rack {
            background: #f5e6d3;
            background-image: radial-gradient(circle at 10% 20%, rgba(210,180,140,0.2) 2%, transparent 2.5%);
            background-size: 20px 20px;
            border-radius: 20px 20px 35px 35px;
            padding: 15px 12px 20px 12px;
            box-shadow: 
                inset 0 1px 4px rgba(255,255,200,0.8),
                0 5px 12px rgba(0,0,0,0.3),
                0 0 0 3px #e9d4b0,
                0 0 0 6px #b87c3a;
            min-height: 110px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        /* شێوازی پۆل */
        .tile {
            width: 58px;
            height: 75px;
            background: linear-gradient(145deg, #fffcf0, #f5e8d4);
            border-radius: 10px;
            box-shadow: -2px 2px 5px rgba(0,0,0,0.2), inset 0 1px 0 white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            font-family: 'Segoe UI', monospace;
        }
        
        .tile::after {
            content: attr(data-number);
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 12px;
            opacity: 0.7;
            font-weight: normal;
        }
        
        .tile[data-color="ڕەش"] { color: #1a1a2e; border-bottom: 4px solid #1a1a2e; }
        .tile[data-color="سوور"] { color: #c44; border-bottom: 4px solid #c44; }
        .tile[data-color="شین"] { color: #37a; border-bottom: 4px solid #37a; }
        .tile[data-color="زەرد"] { color: #da0; border-bottom: 4px solid #da0; }
        
        .tile.joker {
            background: linear-gradient(145deg, #ffea9e, #ffcf5a);
            color: #a56700;
        }
        
        .tile.joker::after {
            content: "🃏";
            font-size: 20px;
            opacity: 1;
        }
        
        .tile.selected {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 12px 20px rgba(0,0,0,0.3);
            filter: brightness(1.02);
        }
        
        /* پشتی پۆل */
        .tile.back {
            background: repeating-linear-gradient(45deg, #b87c4a, #b87c4a 12px, #d69c62 12px, #d69c62 24px);
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.2);
        }
        
        .tile.back::after {
            content: "?";
            opacity: 0.6;
            color: #f5e6d3;
            font-size: 18px;
        }
        
        /* ناوچەی دابەزین */
        .meld-area {
            background: rgba(0,0,0,0.25);
            border-radius: 18px;
            padding: 10px;
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 75px;
        }
        
        .meld-area .tile {
            width: 50px;
            height: 65px;
            font-size: 18px;
            opacity: 0.9;
        }
        
        /* ناوەندی مێز */
        .center-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 20px;
            margin: 10px 0;
            background: rgba(0,0,0,0.15);
            border-radius: 80px;
        }
        
        .pile {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 50px;
        }
        
        .pile .tile {
            cursor: pointer;
        }
        
        .pile-label {
            font-size: 12px;
            color: #ffefc0;
            margin-top: 5px;
        }
        
        /* دوگمەکان */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(180deg, #ffdf9c, #e6b422);
            border: none;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 40px;
            color: #2c4a2c;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #b87c00;
            font-family: inherit;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #b87c00;
        }
        
        button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b87c00;
        }
        
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        
        .message {
            text-align: center;
            padding: 10px;
            margin-top: 15px;
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            font-size: 13px;
            color: #ffefb0;
        }
        
        @media (max-width: 1000px) {
            .tile { width: 45px; height: 60px; font-size: 18px; }
            .meld-area .tile { width: 40px; height: 52px; font-size: 14px; }
            .tile-rack { padding: 10px 8px 15px 8px; }
            .player-name { font-size: 11px; }
        }
        
        @media (max-width: 700px) {
            .player-row { flex-direction: column; }
            .center-area { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
<div class="table">
    <div class="players-grid">
        
        <!-- ڕیزی سەرەوە: یاریزان ١ و ٢ -->
        <div class="player-row">
            <div class="player-card" id="player0Card">
                <div class="player-header">
                    <span class="player-name">👤 یاریزان ١</span>
                    <span class="points-badge" id="player0Points">٠ خاڵ</span>
                </div>
                <div class="tile-rack" id="player0Rack"></div>
                <div class="meld-area" id="player0Meld"></div>
            </div>
            <div class="player-card" id="player1Card">
                <div class="player-header">
                    <span class="player-name">👤 یاریزان ٢</span>
                    <span class="points-badge" id="player1Points">٠ خاڵ</span>
                </div>
                <div class="tile-rack" id="player1Rack"></div>
                <div class="meld-area" id="player1Meld"></div>
            </div>
        </div>
        
        <!-- ناوەند: قاچ و فڕێدراو -->
        <div class="center-area">
            <div class="pile">
                <div class="tile back" id="drawPileTile">?</div>
                <div class="pile-label">📦 قاچ</div>
            </div>
            <div class="pile">
                <div id="discardTile"></div>
                <div class="pile-label">🗑️ فڕێدراو</div>
            </div>
        </div>
        
        <!-- ڕیزی خوارەوە: یاریزان ٣ و ٤ -->
        <div class="player-row">
            <div class="player-card" id="player2Card">
                <div class="player-header">
                    <span class="player-name">👤 یاریزان ٣</span>
                    <span class="points-badge" id="player2Points">٠ خاڵ</span>
                </div>
                <div class="tile-rack" id="player2Rack"></div>
                <div class="meld-area" id="player2Meld"></div>
            </div>
            <div class="player-card" id="player3Card">
                <div class="player-header">
                    <span class="player-name">👤 یاریزان ٤</span>
                    <span class="points-badge" id="player3Points">٠ خاڵ</span>
                </div>
                <div class="tile-rack" id="player3Rack"></div>
                <div class="meld-area" id="player3Meld"></div>
            </div>
        </div>
        
        <!-- دوگمەکان -->
        <div class="controls">
            <button id="drawBtn">🎴 هەڵگرتن</button>
            <button id="discardBtn" disabled>🗑️ فڕێدان</button>
            <button id="meldBtn" disabled>✨ دابەزین</button>
            <button id="resetBtn">🔄 یاری نوێ</button>
        </div>
        
        <div class="message" id="message">👋 کلیک لەسەر پۆلێک بکە بۆ هەڵبژاردن، پاشان فڕێ بدە</div>
    </div>
</div>

<script>
    // ==================== کلاس ====================
    class Tile {
        constructor(color, number, isJoker = false) {
            this.color = color;
            this.number = number;
            this.isJoker = isJoker;
        }
        
        getPoints() {
            if (this.isJoker) return 25;
            if ([1, 10, 11, 12, 13].includes(this.number)) return 10;
            return this.number;
        }
        
        getShortName() {
            if (this.isJoker) return "🃏";
            return `${this.number}`;
        }
    }
    
    // ==================== یاری ====================
    class Game {
        constructor() {
            this.colors = ["ڕەش", "سوور", "شین", "زەرد"];
            this.tiles = [];
            this.players = [[], [], [], []];
            this.melds = [[], [], [], []];
            this.discardPile = [];
            this.openTile = null;
            this.jokerTile = null;
            this.currentPlayer = 0;
            this.gamePhase = "draw";
            this.selectedTileIndex = -1;
            this.winner = -1;
            this.hasDrawn = false;
            this.hasMeldThisTurn = false;
        }
        
        createAllTiles() {
            this.tiles = [];
            for (let color of this.colors) {
                for (let num = 1; num <= 13; num++) {
                    for (let i = 0; i < 2; i++) {
                        this.tiles.push(new Tile(color, num, false));
                    }
                }
            }
            for (let i = 0; i < 2; i++) {
                this.tiles.push(new Tile(null, null, true));
            }
        }
        
        shuffle() {
            for (let i = this.tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [this.tiles[i], this.tiles[j]] = [this.tiles[j], this.tiles[i]];
            }
        }
        
        deal() {
            this.players = [[], [], [], []];
            for (let i = 0; i < 4; i++) {
                let count = i === 0 ? 15 : 14;
                for (let j = 0; j < count; j++) {
                    this.players[i].push(this.tiles.pop());
                }
            }
            this.openTile = this.tiles.pop();
            this.setJokerFromOpenTile();
        }
        
        setJokerFromOpenTile() {
            if (this.openTile.isJoker) {
                this.jokerTile = new Tile(null, null, true);
            } else {
                let newNumber = this.openTile.number - 1;
                if (newNumber === 0) newNumber = 13;
                this.jokerTile = new Tile(this.openTile.color, newNumber, false);
            }
        }
        
        getHandPoints(playerIndex) {
            let total = 0;
            for (let tile of this.players[playerIndex]) {
                total += tile.getPoints();
            }
            return total;
        }
        
        canMeld(playerIndex) {
            return this.getHandPoints(playerIndex) >= 81;
        }
        
        performMeld(playerIndex) {
            if (this.canMeld(playerIndex) && !this.hasMeldThisTurn) {
                this.melds[playerIndex].push(...this.players[playerIndex]);
                this.players[playerIndex] = [];
                this.hasMeldThisTurn = true;
                return true;
            }
            return false;
        }
        
        drawFromPile() {
            if (this.gamePhase !== "draw") return false;
            if (this.tiles.length === 0) return false;
            let tile = this.tiles.pop();
            this.players[this.currentPlayer].push(tile);
            this.hasDrawn = true;
            this.gamePhase = "discard";
            return true;
        }
        
        drawFromDiscard() {
            if (this.gamePhase !== "draw") return false;
            if (this.discardPile.length === 0) return false;
            let tile = this.discardPile.pop();
            this.players[this.currentPlayer].push(tile);
            this.hasDrawn = true;
            this.gamePhase = "discard";
            return true;
        }
        
        discardTile(index) {
            if (this.gamePhase !== "discard") return false;
            if (index < 0 || index >= this.players[this.currentPlayer].length) return false;
            
            let tile = this.players[this.currentPlayer].splice(index, 1)[0];
            this.discardPile.push(tile);
            
            if (this.players[this.currentPlayer].length === 0) {
                this.winner = this.currentPlayer;
                return true;
            }
            
            this.currentPlayer = (this.currentPlayer + 1) % 4;
            this.gamePhase = "draw";
            this.hasDrawn = false;
            this.hasMeldThisTurn = false;
            this.selectedTileIndex = -1;
            return true;
        }
        
        reset() {
            this.createAllTiles();
            this.shuffle();
            this.deal();
            this.discardPile = [];
            this.melds = [[], [], [], []];
            this.currentPlayer = 0;
            this.gamePhase = "draw";
            this.winner = -1;
            this.hasDrawn = false;
            this.hasMeldThisTurn = false;
            this.selectedTileIndex = -1;
        }
    }
    
    // ==================== UI ====================
    let game = new Game();
    
    function renderTile(tile, index, isSelected = false, isBack = false) {
        if (isBack) {
            return `<div class="tile back" data-index="${index}" data-isback="true">?</div>`;
        }
        let colorClass = tile.isJoker ? "joker" : "";
        let colorAttr = tile.color || "";
        let selectedClass = isSelected ? "selected" : "";
        let numberAttr = tile.isJoker ? "" : (tile.number || "");
        return `<div class="tile ${colorClass} ${selectedClass}" data-color="${colorAttr}" data-index="${index}" data-number="${numberAttr}">
                    ${tile.getShortName()}
                </div>`;
    }
    
    function render() {
        // قاچ
        let drawDiv = document.getElementById("drawPileTile");
        if (drawDiv) {
            drawDiv.innerHTML = game.tiles.length > 0 ? "?" : "🔒";
            drawDiv.className = `tile back ${game.tiles.length === 0 ? "disabled" : ""}`;
        }
        
        // فڕێدراو
        let discardDiv = document.getElementById("discardTile");
        if (discardDiv && game.discardPile.length > 0) {
            let lastTile = game.discardPile[game.discardPile.length - 1];
            discardDiv.innerHTML = renderTile(lastTile, 0, false, false);
        } else if (discardDiv) {
            discardDiv.innerHTML = '<div class="tile back" style="opacity:0.5;">-</div>';
        }
        
        // یاریزانەکان
        for (let i = 0; i < 4; i++) {
            let hand = game.players[i];
            let meld = game.melds[i];
            let points = game.getHandPoints(i);
            let isCurrent = (i === game.currentPlayer);
            let canMeld = game.canMeld(i);
            
            // تەختەی پۆل
            let rackDiv = document.getElementById(`player${i}Rack`);
            if (rackDiv) {
                let handHtml = '';
                if (isCurrent) {
                    for (let j = 0; j < hand.length; j++) {
                        handHtml += renderTile(hand[j], j, j === game.selectedTileIndex, false);
                    }
                } else {
                    for (let j = 0; j < hand.length; j++) {
                        handHtml += renderTile(null, j, false, true);
                    }
                }
                rackDiv.innerHTML = handHtml || '<span style="opacity:0.5; font-size:14px;">- بەتاڵ -</span>';
            }
            
            // ناوچەی دابەزین
            let meldDiv = document.getElementById(`player${i}Meld`);
            if (meldDiv) {
                let meldHtml = '';
                if (meld.length > 0) {
                    for (let j = 0; j < meld.length; j++) {
                        meldHtml += renderTile(meld[j], j, false, false);
                    }
                } else {
                    meldHtml = '<span style="opacity:0.5; font-size:12px;">- دابەزین نییە -</span>';
                }
                meldDiv.innerHTML = meldHtml;
            }
            
            // خاڵ
            let pointsSpan = document.getElementById(`player${i}Points`);
            if (pointsSpan) {
                let badgeText = canMeld ? `✨ ${points} خاڵ (دەتوانێت دابەزێت)` : `${points} خاڵ`;
                pointsSpan.innerHTML = badgeText;
                if (canMeld) pointsSpan.style.background = "#ffaa33";
                else pointsSpan.style.background = "#ffd966";
            }
            
            // کلاسی چالاک
            let cardDiv = document.getElementById(`player${i}Card`);
            if (cardDiv) {
                if (isCurrent) cardDiv.classList.add("active");
                else cardDiv.classList.remove("active");
            }
        }
        
        // دوگمەکان
        document.getElementById("drawBtn").disabled = game.gamePhase !== "draw" || game.winner !== -1;
        document.getElementById("discardBtn").disabled = game.gamePhase !== "discard" || game.selectedTileIndex === -1 || game.winner !== -1;
        document.getElementById("meldBtn").disabled = game.gamePhase !== "discard" || !game.canMeld(game.currentPlayer) || game.hasMeldThisTurn || game.winner !== -1;
        
        let msgDiv = document.getElementById("message");
        if (game.winner !== -1) {
            msgDiv.innerHTML = `🎉 براوە! یاریزان ${game.winner+1} سەرکەوت! 🎉`;
            msgDiv.style.background = "#4caf50";
        } else {
            msgDiv.style.background = "rgba(0,0,0,0.6)";
            if (game.gamePhase === "draw") {
                msgDiv.innerHTML = "🎴 کلیک لە 'هەڵگرتن' یان کلیک لە پۆلی فڕێدراو بکە";
            } else {
                msgDiv.innerHTML = "🗑️ پۆلێک هەڵبژێرە و کلیک لە 'فڕێدان' بکە | ✨ ئەگەر خاڵت ≥ ٨١ بێت دەتوانیت دابەزیت";
            }
        }
    }
    
    // ==================== Event Listeners ====================
    function handleTileClick(e) {
        let target = e.target.closest(".tile");
        if (!target) return;
        
        let isBack = target.dataset.isback === "true";
        if (isBack) return;
        
        let index = parseInt(target.dataset.index);
        if (isNaN(index)) return;
        
        if (game.gamePhase === "discard" && game.selectedTileIndex === -1) {
            game.selectedTileIndex = index;
            render();
        } else if (game.gamePhase === "discard" && game.selectedTileIndex !== -1) {
            game.selectedTileIndex = -1;
            render();
        }
    }
    
    function handleDiscardPileClick() {
        if (game.gamePhase === "draw" && game.winner === -1) {
            game.drawFromDiscard();
            render();
        }
    }
    
    function handleDrawPileClick() {
        if (game.gamePhase === "draw" && game.winner === -1) {
            game.drawFromPile();
            render();
        }
    }
    
    document.getElementById("drawBtn").onclick = () => {
        if (game.gamePhase === "draw" && game.winner === -1) {
            game.drawFromPile();
            render();
        }
    };
    
    document.getElementById("discardBtn").onclick = () => {
        if (game.gamePhase === "discard" && game.selectedTileIndex !== -1 && game.winner === -1) {
            game.discardTile(game.selectedTileIndex);
            render();
        }
    };
    
    document.getElementById("meldBtn").onclick = () => {
        if (game.gamePhase === "discard" && game.canMeld(game.currentPlayer) && !game.hasMeldThisTurn && game.winner === -1) {
            game.performMeld(game.currentPlayer);
            render();
        }
    };
    
    document.getElementById("resetBtn").onclick = () => {
        game.reset();
        render();
    };
    
    document.getElementById("discardTile")?.addEventListener("click", handleDiscardPileClick);
    document.getElementById("drawPileTile")?.addEventListener("click", handleDrawPileClick);
    document.querySelector(".players-grid")?.addEventListener("click", handleTileClick);
    
    // دەستپێکردن
    game.reset();
    render();
</script>
</body>
</html>
